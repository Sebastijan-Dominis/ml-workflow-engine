name: hotel_management
channels:
  - conda-forge
  - defaults
dependencies:
  - pytest
  - pytest-cov
  - pdoc
  - ruff
  - isort
  - mypy
  - pre-commit
  - types-requests
  - types-pyyaml
  - types-ujson
  - types-Deprecated

