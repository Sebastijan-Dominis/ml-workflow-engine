name: cancellation_global
task: binary_classification
version: v1
target: "is_canceled"
algorithm: catboost
features:
  features_path: data/features/cancellation/global/v1/
  features_version: v1
  schema_path: data/features/cancellation/global/v1/schema.csv
  derived_features: ["total_stay", "adr_per_person", "arrival_season"]
  derived_categorical_features: ["arrival_season"]
artifacts:
  components_path: ml.components.catboost_classification_v1
search:
  broad:
    iterations: 1
    n_iter: 1
  narrow:
    iterations: 1
    n_iter: 1
  random_state: 42
  cv: 3
  scoring: "roc_auc"
  search_script: "catboost_classification_v1"
training_params: {
  iterations: 1,
  task_type: "CPU",
  random_state: 42,
  verbose: 100,
}
pipeline_steps: {
  validate_schema: true,
  fill_categorical_missing: true,
  feature_engineering: true,
  feature_selection: true,
  model: true
}
