name: cancellation_city_hotel_online_ta
task: binary_classification
version: v1
data:
  features_path: data/features/cancellation/hotel_market_segment/city_hotel_online_ta_v1
  features_version: v1
  target: is_canceled
  train_file: X_train.parquet
  val_file: X_val.parquet
  test_file: X_test.parquet
  y_train: y_train.parquet
  y_val: y_val.parquet
  y_test: y_test.parquet
model:
  algorithm: catboost
  params:
    random_strength: 5
    min_data_in_leaf: 5
    learning_rate: 0.1
    l2_leaf_reg: 1
    depth: 10
    colsample_bylevel: 1.0
    border_count: 128
    bagging_temperature: 0.75
    iterations: 5
    task_type: CPU
    random_state: 42
    verbose: 100
  threshold: 0.48
pipeline:
  validate_schema: true
  fill_categorical_missing: true
  feature_engineering: true
  feature_selection: true
explainability:
  feature_importance_method: PredictionValuesChange
  shap_method: tree_explainer_mean_abs
