repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: ruff
        language: system
        types: [python]
        args: ["check", "--fix"]
        pass_filenames: false

      - id: mypy
        name: mypy (ml + pipelines)
        entry: mypy
        language: system
        pass_filenames: false
        args: ["ml", "pipelines"]

      - id: import-layers
        name: import layer guardrails
        entry: python scripts/quality/check_import_layers.py
        language: system
        pass_filenames: false

      - id: naming-conventions
        name: check naming conventions
        entry: python scripts/quality/check_naming_conventions.py
        language: system
        pass_filenames: true
        types: [python]

      - id: pytest
        name: run pytest
        entry: pytest
        language: system
        pass_filenames: false
        args: ["-v"]