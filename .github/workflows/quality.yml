name: Quality

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          channels: conda-forge
          channel-priority: strict

      - name: Install tooling on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash -l {0}
        run: conda install -y -c conda-forge ruff mypy

      - name: Install tooling on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: conda install -y -c conda-forge ruff mypy

      - name: ruff check on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash -l {0}
        run: ruff check .

      - name: ruff check on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: ruff check .

      - name: mypy on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash -l {0}
        run: mypy ml pipelines

      - name: mypy on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: mypy ml pipelines

      - name: import layer guardrails on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash -l {0}
        run: python scripts/quality/check_import_layers.py

      - name: import layer guardrails on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: python scripts/quality/check_import_layers.py

      - name: check naming conventions on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash -l {0}
        run: python scripts/quality/check_naming_conventions.py

      - name: check naming conventions on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: python scripts/quality/check_naming_conventions.py