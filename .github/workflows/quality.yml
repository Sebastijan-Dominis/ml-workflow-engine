name: Quality

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          channels: conda-forge
          channel-priority: strict
          python-version: 3.11.14  # pin Python version for consistency

      - name: Install tooling on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash -l
        run: |
          conda install -y -c conda-forge ruff mypy types-pyyaml numpy-stubs

      - name: Install tooling on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          conda install -y -c conda-forge ruff mypy types-pyyaml numpy-stubs

      - name: ruff check
        run: ruff check .
        shell: bash -l  # works on Linux/macOS
        if: runner.os != 'Windows'

      - name: ruff check on Windows
        run: ruff check .
        shell: powershell
        if: runner.os == 'Windows'

      - name: mypy
        run: mypy ml pipelines
        shell: bash -l
        if: runner.os != 'Windows'

      - name: mypy on Windows
        run: mypy ml pipelines
        shell: powershell
        if: runner.os == 'Windows'

      - name: import layer guardrails
        run: python scripts/quality/check_import_layers.py
        shell: bash -l
        if: runner.os != 'Windows'

      - name: import layer guardrails on Windows
        run: python scripts/quality/check_import_layers.py
        shell: powershell
        if: runner.os == 'Windows'

      - name: check naming conventions
        run: python scripts/quality/check_naming_conventions.py
        shell: bash -l
        if: runner.os != 'Windows'

      - name: check naming conventions on Windows
        run: python scripts/quality/check_naming_conventions.py
        shell: powershell
        if: runner.os == 'Windows'