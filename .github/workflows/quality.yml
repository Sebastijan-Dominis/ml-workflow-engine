name: Quality

on:
  pull_request:
  push:
    # branches: [main, master]
    branches: [none] # Temporarily disabled to avoid hitting the GitHub Actions limit of 2000 minutes per month

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip ruff==0.15.4 mypy==1.19.1 types-pyyaml==6.0.12 pytest==9.0.2

      - name: Show installed versions
        run: |
          python --version
          pip list | grep -E "ruff|mypy|types-pyyaml|pytest"

      - name: Run ruff
        run: ruff check .

      - name: Run mypy (non-strict, respects mypy.ini)
        run: mypy ml pipelines

      - name: Import layer guardrails
        run: python scripts/quality/check_import_layers.py

      - name: Check naming conventions
        run: python scripts/quality/check_naming_conventions.py