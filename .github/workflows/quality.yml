name: Quality

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install tooling
        run: |
          pip install ruff==0.15.4 mypy==1.19.1 types-pyyaml==6.0.12

      - name: Show installed versions
        run: |
          python --version
          pip list | grep -E "ruff|mypy|types-pyyaml"

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy ml pipelines

      - name: Import layer guardrails
        run: python scripts/quality/check_import_layers.py

      - name: Check naming conventions
        run: python scripts/quality/check_naming_conventions.py