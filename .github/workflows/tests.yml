name: Run Tests

on:
  pull_request:
  push:
    # branches: [main, master]
    branches: [none] # Temporarily disabled to avoid hitting the GitHub Actions limit of 2000 minutes per month

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: 3.11
          environment-file: environment.yml
          activate-environment: hotel_management
          use-mamba: true
          auto-activate-base: false

      - name: Show environment
        run: conda run -n hotel_management conda list

      - name: Run tests
        run: conda run -n hotel_management pytest -v --maxfail=1 --disable-warnings