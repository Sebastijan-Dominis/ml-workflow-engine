problem: no_show
segment:
  name: city_hotel
  description: All bookings for the City Hotel.
version: v1
task: 
  type: classification
  subtype: binary

target:
  name: no_show
  allowed_dtypes:
    - int64
  classes:
    count: 2
    positive_class: 1
    min_class_count: 100
  version: v1

segmentation:
  enabled: true
  include_in_model: false
  filters:
    - column: hotel
      op: eq
      value: City Hotel

split:
  strategy: random
  stratify_by: no_show
  test_size: 0.2
  val_size: 0.12
  random_state: 42

algorithm: catboost
model_class: CatBoostClassifier

pipeline:
  version: v1
  path: configs/pipelines/tabular/catboost/v1.yaml

feature_store:
  path: feature_store/
  feature_sets:
    - name: booking_context_features
      version: v7
      schema_format: csv
      input_schema: input_schema.csv
      derived_schema: derived_schema.csv
      data_format: parquet
      file_name: features.parquet
    - name: customer_history_features
      version: v4
      schema_format: csv
      input_schema: input_schema.csv
      derived_schema: derived_schema.csv
      data_format: parquet
      file_name: features.parquet
    - name: pricing_party_features
      version: v5
      schema_format: csv
      input_schema: input_schema.csv
      derived_schema: derived_schema.csv
      data_format: parquet
      file_name: features.parquet
    - name: channel_and_agent_features
      version: v3
      schema_format: csv
      input_schema: input_schema.csv
      derived_schema: derived_schema.csv
      data_format: parquet
      file_name: features.parquet

scoring:
  policy: fixed
  fixed_metric: average_precision
class_weighting:
  policy: always
  strategy: balanced

explainability:
  enabled: true
  top_k: 20
  methods:
    feature_importances:
      enabled: true
      type: PredictionValuesChange
    shap:
      enabled: true
      approximate: tree

data_type: tabular

model_specs_lineage:
  created_by: Sebastijan
  created_at: "2026-02-28t15:05:49z"