problem: cancellation
segment:
  name: global
  description: All bookings
version: v1
task: 
  type: classification
  subtype: binary

target:
  name: is_canceled
  allowed_dtypes:
    - int64
  classes:
    count: 2
    positive_class: 1
    min_class_count: 200
  version: v1

segmentation:
  enabled: false

split:
  strategy: random
  stratify_by: is_canceled
  test_size: 0.2
  val_size: 0.12
  random_state: 42

algorithm: catboost
model_class: CatBoostClassifier

pipeline:
  version: v1
  path: configs/pipelines/tabular/catboost/v1.yaml

feature_store:
  path: feature_store/
  feature_sets:
    - name: booking_context_features
      version: v1
      data_format: parquet
      file_name: features.parquet
    - name: customer_history_features
      version: v1
      data_format: parquet
      file_name: features.parquet
    - name: pricing_party_features
      version: v1
      data_format: parquet
      file_name: features.parquet
    - name: channel_and_agent_features
      version: v1
      data_format: parquet
      file_name: features.parquet

scoring:
  policy: adaptive_binary  # used only for hyperparameter search
  pr_auc_threshold: 0.1   # triggers PR-AUC scoring in search if minority class < 10%
class_weighting:
  policy: if_imbalanced
  imbalance_threshold: 0.1
  strategy: balanced

explainability:
  enabled: true
  top_k: 20
  methods:
    feature_importances:
      enabled: true
      type: PredictionValuesChange
    shap:
      enabled: true
      approximate: tree

data_type: tabular

model_specs_lineage:
  created_by: Sebastijan
  created_at: "2026-02-27t23:53:30z"
