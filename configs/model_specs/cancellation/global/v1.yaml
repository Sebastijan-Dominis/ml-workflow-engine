problem: cancellation
segment:
  name: global
  description: All bookings
version: v1
task: 
  type: classification
  subtype: binary
target: is_canceled
algorithm: catboost
model_class: CatBoostClassifier

pipeline:
  version: v1
  path: configs/pipelines/tabular/catboost/v1.yaml

feature_store:
  path: feature_store/
  feature_sets:
    - ref: cancellation/global
      name: base_features
      version: v1
      schema_format: csv
      input_schema: input_schema.csv
      derived_schema: derived_schema.csv
      data_format: parquet
      X_train: X_train.parquet
      X_val: X_val.parquet
      X_test: X_test.parquet
      y_train: y_train.parquet
      y_val: y_val.parquet
      y_test: y_test.parquet

explainability:
  enabled: true
  top_k: 20
  methods:
    feature_importances:
      enabled: true
      type: PredictionValuesChange
    shap:
      enabled: true
      approximate: tree

data_type: tabular
