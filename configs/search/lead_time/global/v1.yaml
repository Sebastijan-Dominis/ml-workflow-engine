extends:
  - ../../../../configs/defaults/global.yaml
  - ../../../../configs/defaults/catboost.yaml
  - ../../../../configs/model_specs/lead_time/global/v1.yaml

search:
  random_state: 42

  broad:
    iterations: 800
    n_iter: 50
    param_distributions:
      model:
        depth: [4, 6, 8, 10]
        learning_rate: [0.005, 0.01, 0.03, 0.05, 0.1, 0.2, 0.3]
        l2_leaf_reg: [1.0, 3.0, 5.0, 7.0, 9.0]          
        random_strength: [1.0, 2.0, 5.0, 8.0, 10.0, 12.0]
        min_data_in_leaf: [1, 3, 5, 8, 10, 15, 20]
        border_count: [32, 64, 128, 254]
      ensemble:
        colsample_bylevel: [1.0]
        bagging_temperature: [0.0, 0.25, 0.5, 0.75, 1.0, 2.0, 5.0]

  narrow:
    enabled: true
    iterations: 800
    n_iter: 30
    param_configurations:
      model:
        depth:
          include: true
          offsets: [1, 2]
          low: 2
          high: 12
        learning_rate:
          include: true
          factors: [0.7, 0.85, 1.0, 1.15, 1.3]
          low: 0.003
          high: 0.5
          decimals: 5
        l2_leaf_reg:
          include: true
          factors: [0.7, 0.85, 1.0, 1.15, 1.3]
          low: 1.0
          high: 30.0
          decimals: 2
        random_strength:
          include: true
          factors: [0.7, 0.85, 1.0, 1.15, 1.3]
          low: 0.0
          high: 20.0
          decimals: 2
        min_data_in_leaf:
          include: true
          offsets: [2, 5, 10]
          low: 1
          high: 50
        border_count:
          include: true
      ensemble:
        bagging_temperature:
          include: true
          factors: [0.6, 0.8, 1.0, 1.2, 1.5]
          low: 0.0
          high: 5.0
          decimals: 3

search_lineage:
  created_by: Sebastijan
  created_at: "2026-02-27t23:53:30z"
