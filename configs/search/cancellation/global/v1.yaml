cv: 3
scoring: roc_auc
random_state: 42

hardware:
  task_type: GPU
  devices: [0]

seed: 42

verbose: 100

broad_search:
  iterations: 10
  n_iter: 1
  param_distributions:
    Model__depth: [4, 6, 8, 10]
    Model__learning_rate: [0.005, 0.01, 0.03, 0.05, 0.1, 0.2, 0.3]
    Model__l2_leaf_reg: [1, 3, 5, 7, 9]
    Model__bagging_temperature: [0, 0.25, 0.5, 0.75, 1.0, 2.0, 5.0]
    Model__border_count: [32, 64, 128, 254]
    Model__min_data_in_leaf: [1, 3, 5, 8, 10, 15, 20]
    Model__colsample_bylevel: [1.0] # Set to 1.0 to avoid issues with GPU training
    Model__random_strength: [1, 2, 5, 8, 10, 12]

narrow_search:
  enabled: true
  iterations: 10
  n_iter: 1
  Model__depth:
    include: true
    offsets: [1, 2]
    low: 2
    high: 12
  Model__learning_rate:
    include: true
    factors: [0.7, 0.85, 1.0, 1.15, 1.3]
    low: 0.003
    high: 0.5
  Model__l2_leaf_reg:
    include: true
    offsets: [1, 2, 3]
    low: 1
    high: 30
  Model__bagging_temperature:
    include: true
    factors: [0.6, 0.8, 1.0, 1.2, 1.5]
    low: 0.0
    high: 5.0
  Model__min_data_in_leaf:
    include: true
    offsets: [2, 5, 10]
    low: 1
    high: 50
  Model__random_strength:
    include: true
    offsets: [1, 2, 4]
    low: 0
    high: 20
  Model__border_count:
    include: false
  Model__colsample_bylevel:
    include: false