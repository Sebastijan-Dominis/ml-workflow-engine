booking_context_features:
  v1:
    type: tabular
    description: >
      Features describing the booking itself, independent of the guest's past.
    data:
      path: data/processed/hotel_bookings/v1/hotel_bookings.parquet
      metadata_path: data/processed/hotel_bookings/v1/metadata.json
      source: data/raw/hotel_bookings/v1/hotel_bookings_kaggle.csv
      format: parquet
    min_rows: 5000
    feature_store_path: feature_store/booking_context_features/v1
    columns:
      - hotel
      - lead_time
      - arrival_date_year
      - arrival_date_month
      - arrival_date_week_number
      - arrival_date_day_of_month
      - stays_in_weekend_nights
      - stays_in_week_nights
      - meal
      - deposit_type
      - days_in_waiting_list
    feature_roles:
      categorical:
        - hotel
        - arrival_date_month
        - meal
        - deposit_type
      numerical:
        - lead_time
        - arrival_date_year
        - arrival_date_week_number
        - arrival_date_day_of_month
        - stays_in_weekend_nights
        - stays_in_week_nights
        - days_in_waiting_list
      datetime: []
    operators:
      mode: logical
      names:
        - TotalStay
        - ArrivalSeason
        - ArrivalDate
      hash: 7403b69c49e9e12717c0574b79d4457c
      required_features:
        TotalStay: [stays_in_weekend_nights, stays_in_week_nights]
        ArrivalSeason: [arrival_date_week_number]
        ArrivalDate: [arrival_date_year, arrival_date_month, arrival_date_week_number]
    constraints:
      forbid_nulls: [hotel, lead_time, arrival_date_year, arrival_date_month, arrival_date_week_number, arrival_date_day_of_month, stays_in_weekend_nights, stays_in_week_nights, meal, deposit_type, days_in_waiting_list]
      max_cardinality: 
        hotel: 2
        arrival_date_month: 12
        arrival_date_week_number: 53
        arrival_date_day_of_month: 31
        meal: 5
        deposit_type: 3
    storage:
      format: parquet
      compression: snappy
    lineage:
      feature_set_version: v1
      created_by: Sebastijan
      created_at: "2026-01-31"
  v2:
    type: tabular
    description: >
      Updated version of booking context features, which doesn't include arrival_date_year, arrival_date_month and arrival_date_day_of_month. It also doesn't create ArrivalDate, but still creates ArrivalSeason.
    data:
      path: data/processed/hotel_bookings/v1/hotel_bookings.parquet
      metadata_path: data/processed/hotel_bookings/v1/metadata.json
      source: data/raw/hotel_bookings/v1/hotel_bookings_kaggle.csv
      format: parquet
    min_rows: 5000
    feature_store_path: feature_store/booking_context_features/v2
    columns:
      - hotel
      - lead_time
      - arrival_date_week_number
      - stays_in_weekend_nights
      - stays_in_week_nights
      - meal
      - deposit_type
      - days_in_waiting_list
    feature_roles:
      categorical:
        - hotel
        - meal
        - deposit_type
      numerical:
        - lead_time
        - arrival_date_week_number
        - stays_in_weekend_nights
        - stays_in_week_nights
        - days_in_waiting_list
      datetime: []
    operators:
      mode: logical
      names:
        - TotalStay
        - ArrivalSeason
      hash: 1a7b57fce8c0b48453d8e19c70aec2b2
      required_features:
        TotalStay: [stays_in_weekend_nights, stays_in_week_nights]
        ArrivalSeason: [arrival_date_week_number]
    constraints:
      forbid_nulls: [hotel, lead_time, arrival_date_week_number, stays_in_weekend_nights, stays_in_week_nights, meal, deposit_type, days_in_waiting_list]
      max_cardinality: 
        hotel: 2
        arrival_date_week_number: 53
        meal: 5
        deposit_type: 3
    storage:
      format: parquet
      compression: snappy
    lineage:
      feature_set_version: v2
      created_by: Sebastijan
      created_at: "2026-02-28"
  v3:
    type: tabular
    description: >
      Updated version of booking context features, which doesn't include arrival_date_year, arrival_date_week_number, arrival_date_day_of_month, arrival_month, lead_time, and days_in_waiting_list. It also doesn't create arrival_season and arrival_date.
