booking_context_features:
  v1:
    type: tabular
    description: >
      Features describing the booking itself, independent of the guest's past.
    data:
      - ref: data/processed
        name: hotel_bookings
        version: v1
        format: parquet
        merge_key: row_id
        path_suffix: data.{format}
    min_rows: 5000
    feature_store_path: feature_store/booking_context_features/v1
    columns:
      - hotel
      - lead_time
      - arrival_date_year
      - arrival_date_month
      - arrival_date_week_number
      - arrival_date_day_of_month
      - stays_in_weekend_nights
      - stays_in_week_nights
      - meal
      - deposit_type
      - days_in_waiting_list
    feature_roles:
      categorical:
        - hotel
        - arrival_date_month
        - meal
        - deposit_type
      numerical:
        - lead_time
        - arrival_date_year
        - arrival_date_week_number
        - arrival_date_day_of_month
        - stays_in_weekend_nights
        - stays_in_week_nights
        - days_in_waiting_list
      datetime: []
    operators:
      mode: logical
      names:
        - TotalStay
        - ArrivalSeason
        - ArrivalDate
      hash: 4d5649d80e845f43e8d6838bcd4b40d9
      required_features:
        TotalStay: [stays_in_weekend_nights, stays_in_week_nights]
        ArrivalSeason: [arrival_date_week_number]
        ArrivalDate: [arrival_date_year, arrival_date_month, arrival_date_week_number]
    constraints:
      forbid_nulls: [hotel, lead_time, arrival_date_year, arrival_date_month, arrival_date_week_number, arrival_date_day_of_month, stays_in_weekend_nights, stays_in_week_nights, meal, deposit_type, days_in_waiting_list]
      max_cardinality: 
        hotel: 2
        arrival_date_month: 12
        arrival_date_week_number: 53
        arrival_date_day_of_month: 31
        meal: 5
        deposit_type: 3
    storage:
      format: parquet
      compression: snappy
    lineage:
      created_by: Sebastijan
      created_at: "2026-02-27t23:53:30z"
  v2:
    type: tabular
    description: >
      Updated version of booking context features, which doesn't include arrival_date_year, arrival_date_month and arrival_date_day_of_month. It also doesn't create ArrivalDate, but still creates ArrivalSeason. Useful for adr prediction, where arrival_date_year, arrival_date_month and arrival_date_day_of_month are not relevant, but seasonality is.
