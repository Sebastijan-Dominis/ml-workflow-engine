pricing_party_features:
  v1:
    type: tabular
    description: >
      Features describing the pricing of the booking, as well as the number of people in the booking, which is relevant for pricing. They answer the question "How much did the booking cost and how many people were in the booking?".
    data:
      path: data/processed/hotel_bookings/v1/hotel_bookings.parquet
      metadata_path: data/processed/hotel_bookings/v1/metadata.json
      source: data/raw/hotel_bookings/v1/hotel_bookings_kaggle.csv
      format: parquet
    min_rows: 5000
    feature_store_path: feature_store/pricing_party_features/v1
    columns:
      - adr
      - required_car_parking_spaces
      - total_of_special_requests
      - adults
      - children
      - babies
    feature_roles:
      categorical: []
      numerical:
        - adr
        - required_car_parking_spaces
        - total_of_special_requests
        - adults
        - children
        - babies
      datetime: []
    operators:
      mode: logical
      names:
        - AdrPerPerson
      hash: 4c7437bfec9d8c4b4af1421186d5277f
      required_features:
        AdrPerPerson: [adr, adults, children, babies]
    constraints:
      forbid_nulls: [adr, adults, children, babies, required_car_parking_spaces, total_of_special_requests]
      max_cardinality: 
        required_car_parking_spaces: 10
        total_of_special_requests: 5
